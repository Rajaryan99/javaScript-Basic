<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #484848; color: #fff;">

    <div class="main">
        <h1>
            BMI Calculator
        </h1>
        <form>
        <div>
            <label for="heightInput">Height in CM:</label>
            <input type="text" class="heightInput" id="height" placeholder="eg. Hight">
        </div>
        <br><br><br>
        <div>
            <label for="heightInput">Weight in KG:</label>
            <input type="text" class="weightInput" id="weight" placeholder="eg. weight">
        </div>
        <div>
        <button>Calculate</button>
        </div>
        <div >
            <h2 id="result"></h2>
        </div>

        <div>
            <h2>BMI Weight Guide</h2>

            <h3>Under Wight = Less then 18.6</h3>
            <h3>Normal Range =18.6 and 24.9</h3>
            <h3>OverWeight = Greater then 24.9</h3>
        </div>
        </form>



    </div>
    
</body>
<script src="script.js"></script>
</html>
